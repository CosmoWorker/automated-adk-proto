name: CI/CD pipeline on Cloud Run
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PROJECT_ID: gcp-project-id
  REGION: us-east1
  SERVICE_NAME: capa-agent-service

jobs:
  test:
    name: Run tests
    runs-on: Ubuntu@latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python 
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt 
          pip install pytest httpx
      - name: Run pytest
        run: pytest tests/

